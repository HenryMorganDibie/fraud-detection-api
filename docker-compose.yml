services:
  api:
    build:
      context: .
      target: production
    ports:
      - "8888:8888"
    environment:
      - FRAUD_THRESHOLD=50
      - MODEL_VERSION=1.0.0
      - APP_VERSION=1.0.0
      - MODEL_PATH=model/fraud-model.joblib
      - API_KEY=dev-key-change-in-production
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
        reservations:
          cpus: "0.25"
          memory: 256M
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8888/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  test:
    build:
      context: .
      target: test
    command: python -m pytest tests/ -v
    environment:
      - FRAUD_THRESHOLD=50
      - MODEL_VERSION=1.0.0
      - APP_VERSION=1.0.0
      - MODEL_PATH=model/fraud-model.joblib
      - API_KEY=dev-key-change-in-production